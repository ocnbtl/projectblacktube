name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Shared tests
        run: pnpm --filter @blacktube/shared test
      - name: Typecheck web
        run: pnpm --filter @blacktube/web typecheck
      - name: Build web
        run: pnpm --filter @blacktube/web build

